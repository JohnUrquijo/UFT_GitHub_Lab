name: Ejecutar UFT desde GitHub John Urquijo

on:
  workflow_dispatch:

jobs:
  run-uft:
    runs-on: self-hosted

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Crear carpeta de resultados
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "C:\UFT_GitHub_Lab\Results\ScriptPruebaAdvantage"

      - name: Ejecutar script UFT
        shell: powershell
        run: |
          & "C:\Program Files (x86)\OpenText\Functional Testing\bin\UFTBatchRunnerCMD.exe" -source "C:\UFT_GitHub_Lab\ScriptPruebaAdvantage" -result "C:\UFT_GitHub_Lab\Results\ScriptPruebaAdvantage"
